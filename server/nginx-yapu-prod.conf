# YAPU Production — yapu.promptheus.cloud
# Copy to: /etc/nginx/sites-available/yapu-prod
# Symlink: ln -s /etc/nginx/sites-available/yapu-prod /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d yapu.promptheus.cloud
#
# DNS Records Required (create in your DNS provider):
#
# Type  Host                              Value              TTL
# A     yapu.promptheus.cloud             <VPS_IP_ADDRESS>   3600
# A     yapu-preview.promptheus.cloud     <VPS_IP_ADDRESS>   3600
#
# VPS Setup Steps:
# 1. Create DNS A records above (wait for propagation, ~5-30 min)
# 2. SSH to VPS: ssh root@<VPS_IP_ADDRESS>
# 3. Clone/update repo: cd /home/yapu/yapu2 && git pull origin master
# 4. Install dependencies: npm ci
# 5. Copy nginx configs:
#    cp server/nginx-yapu-prod.conf /etc/nginx/sites-available/yapu-prod
#    cp server/nginx-yapu-preview.conf /etc/nginx/sites-available/yapu-preview
#    ln -s /etc/nginx/sites-available/yapu-prod /etc/nginx/sites-enabled/
#    ln -s /etc/nginx/sites-available/yapu-preview /etc/nginx/sites-enabled/
# 6. Edit preview config — replace PREVIEW_ACCESS_TOKEN_PLACEHOLDER with real token:
#    nano /etc/nginx/sites-available/yapu-preview
# 7. Test nginx config: nginx -t
# 8. Obtain SSL certs:
#    certbot --nginx -d yapu.promptheus.cloud
#    certbot --nginx -d yapu-preview.promptheus.cloud
# 9. Create .env.local: cp .env.example .env.local && nano .env.local
# 10. Build production: npm run build
# 11. Start PM2: pm2 start server/ecosystem.config.js && pm2 save && pm2 startup
# 12. Verify: curl https://yapu.promptheus.cloud

server {
    listen 80;
    server_name yapu.promptheus.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yapu.promptheus.cloud;

    # SSL certs — managed by certbot (paths populated after certbot runs)
    # ssl_certificate /etc/letsencrypt/live/yapu.promptheus.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yapu.promptheus.cloud/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache, no logging
    location /_next/static {
        proxy_pass http://127.0.0.1:3003;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other traffic
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
