# YAPU Preview — yapu-preview.promptheus.cloud
# Copy to: /etc/nginx/sites-available/yapu-preview
# Symlink: ln -s /etc/nginx/sites-available/yapu-preview /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d yapu-preview.promptheus.cloud

server {
    listen 80;
    server_name yapu-preview.promptheus.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yapu-preview.promptheus.cloud;

    # SSL certs — managed by certbot (paths populated after certbot runs)
    # ssl_certificate /etc/letsencrypt/live/yapu-preview.promptheus.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yapu-preview.promptheus.cloud/privkey.pem;

    # Bearer token gate — Ember passes token, browsers without it get 403
    # Replace PREVIEW_ACCESS_TOKEN_PLACEHOLDER with the actual token value on the VPS
    set $preview_token "PREVIEW_ACCESS_TOKEN_PLACEHOLDER";

    location / {
        # CORS headers for cross-origin Ember access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Content-Security-Policy "frame-ancestors *" always;

        # Handle CORS preflight — must respond before bearer check
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Bearer check
        if ($http_authorization != "Bearer $preview_token") {
            return 403 '{"error": "Forbidden"}';
        }

        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
